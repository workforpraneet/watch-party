<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="logo">🎬</span>
      <h1>WatchParty</h1>
    </div>

    <p class="tagline">Watch together, stay connected.</p>

    <div class="section">
      <label>Your Name</label>
      <input type="text" id="username" placeholder="Enter your name">
    </div>

    <button id="save-btn" class="btn-save">Save Name</button>

    <div class="divider" style="margin: 16px 0;"></div>

    <div class="section">
      <label>Join a Party</label>
      <div style="display: flex; gap: 8px;">
        <input type="text" id="room-code" placeholder="Room Code">
        <button id="join-btn" class="btn-save" style="width: auto; padding: 0 16px;">Join</button>
      </div>
    </div>

    <div id="status" class="status"></div>

    <div class="divider"></div>

    <div class="supported">
      <h3>Supported Platforms</h3>
      <div class="platforms">
        <span class="chip">Netflix</span>
        <span class="chip">JioHotstar</span>
        <span class="chip">Prime Video</span>
        <span class="chip">YouTube</span>
        <span class="chip">Zee5</span>
      </div>
    </div>

    <p class="hint">Open a streaming site and click the <strong>🎬</strong> button to start a party!</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
